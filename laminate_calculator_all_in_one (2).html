<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор укладки ламината</title>
<script src="react.development.js"></script>
<script src="react-dom.development.js"></script>
<script src="babel.min.js"></script>
<style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    label {
      display: block;
      margin: 8px 0;
    }
    input {
      margin-left: 8px;
      width: 80px;
    }
    @media (max-width: 600px) {
      input {
        width: 100%;
        margin-top: 4px;
      }
      label {
        font-size: 14px;
      }
    }
.cls-1 {fill: #3f4f75;} .cls-2 {fill: #80cfbe;} .cls-3 {fill: #fff;}
</style>
</head>
<body>
<div id="french-root"></div>
<script type="text/babel">
     const { useState, useRef, useMemo, useEffect } = React;

    const VIEWPORT_WIDTH = 800;
    const VIEWPORT_HEIGHT = 600;
    const DEFAULT_VIEWBOX = { minX: 0, minY: 0, width: 8000, height: 6000 };
    const GEOMETRY_EPSILON = 0.000001;

    function projectPointToSegment(point, a, b) {
      const abx = b.x - a.x;
      const aby = b.y - a.y;
      const apx = point.x - a.x;
      const apy = point.y - a.y;
      const abLenSq = abx * abx + aby * aby;
      if (abLenSq === 0) return a;

      const t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / abLenSq));
      return {
        x: a.x + abx * t,
        y: a.y + aby * t
      };
    }

    function polygonArea(points) {
      let area = 0;
      for (let i = 0; i < points.length; i++) {
        const j = (i + 1) % points.length;
        area += points[i].x * points[j].y - points[j].x * points[i].y;
      }
      return Math.abs(area / 2);
    }

    function pointOnSegment(point, start, end) {
      const cross = (end.x - start.x) * (point.y - start.y) - (end.y - start.y) * (point.x - start.x);
      if (Math.abs(cross) > GEOMETRY_EPSILON) return false;

      const minX = Math.min(start.x, end.x) - GEOMETRY_EPSILON;
      const maxX = Math.max(start.x, end.x) + GEOMETRY_EPSILON;
      const minY = Math.min(start.y, end.y) - GEOMETRY_EPSILON;
      const maxY = Math.max(start.y, end.y) + GEOMETRY_EPSILON;

      return point.x >= minX && point.x <= maxX && point.y >= minY && point.y <= maxY;
    }

    function segmentCrossValue(start, end, point) {
      return (end.x - start.x) * (point.y - start.y) - (end.y - start.y) * (point.x - start.x);
    }

    function segmentsIntersect(aStart, aEnd, bStart, bEnd) {
      const cross1 = segmentCrossValue(aStart, aEnd, bStart);
      const cross2 = segmentCrossValue(aStart, aEnd, bEnd);
      const cross3 = segmentCrossValue(bStart, bEnd, aStart);
      const cross4 = segmentCrossValue(bStart, bEnd, aEnd);

      const hasProperIntersection = (
        ((cross1 > GEOMETRY_EPSILON && cross2 < -GEOMETRY_EPSILON) || (cross1 < -GEOMETRY_EPSILON && cross2 > GEOMETRY_EPSILON))
        && ((cross3 > GEOMETRY_EPSILON && cross4 < -GEOMETRY_EPSILON) || (cross3 < -GEOMETRY_EPSILON && cross4 > GEOMETRY_EPSILON))
      );

      if (hasProperIntersection) return true;
      if (Math.abs(cross1) <= GEOMETRY_EPSILON && pointOnSegment(bStart, aStart, aEnd)) return true;
      if (Math.abs(cross2) <= GEOMETRY_EPSILON && pointOnSegment(bEnd, aStart, aEnd)) return true;
      if (Math.abs(cross3) <= GEOMETRY_EPSILON && pointOnSegment(aStart, bStart, bEnd)) return true;
      if (Math.abs(cross4) <= GEOMETRY_EPSILON && pointOnSegment(aEnd, bStart, bEnd)) return true;

      return false;
    }

    function polygonHasEdgeIntersection(polygonA, polygonB) {
      for (let i = 0; i < polygonA.length; i++) {
        const aStart = polygonA[i];
        const aEnd = polygonA[(i + 1) % polygonA.length];

        for (let j = 0; j < polygonB.length; j++) {
          const bStart = polygonB[j];
          const bEnd = polygonB[(j + 1) % polygonB.length];
          if (segmentsIntersect(aStart, aEnd, bStart, bEnd)) {
            return true;
          }
        }
      }

      return false;
    }

    function isPointInPolygon(point, polygon) {
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        if (pointOnSegment(point, polygon[j], polygon[i])) {
          return true;
        }
      }

      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i].x;
        const yi = polygon[i].y;
        const xj = polygon[j].x;
        const yj = polygon[j].y;
        const intersect = ((yi > point.y) !== (yj > point.y))
          && (point.x < (xj - xi) * (point.y - yi) / (yj - yi + 0.00001) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function polygonsIntersect(polygonA, polygonB) {
      if (polygonA.some(point => isPointInPolygon(point, polygonB))) return true;
      if (polygonB.some(point => isPointInPolygon(point, polygonA))) return true;
      return polygonHasEdgeIntersection(polygonA, polygonB);
    }

    function isPolygonFullyInsidePolygon(innerPolygon, outerPolygon) {
      if (!innerPolygon.every(point => isPointInPolygon(point, outerPolygon))) {
        return false;
      }

      return !polygonHasEdgeIntersection(innerPolygon, outerPolygon);
    }

    function getPolygonBounds(polygon) {
      const xs = polygon.map(point => point.x);
      const ys = polygon.map(point => point.y);
      return {
        minX: Math.min(...xs),
        maxX: Math.max(...xs),
        minY: Math.min(...ys),
        maxY: Math.max(...ys)
      };
    }

    function buildFittedViewBox(sourcePoints) {
      if (!sourcePoints.length) {
        return DEFAULT_VIEWBOX;
      }

      const xs = sourcePoints.map(point => point.x);
      const ys = sourcePoints.map(point => point.y);
      const rawMinX = Math.min(...xs);
      const rawMaxX = Math.max(...xs);
      const rawMinY = Math.min(...ys);
      const rawMaxY = Math.max(...ys);
      const padding = 500;

      let minX = rawMinX - padding;
      let maxX = rawMaxX + padding;
      let minY = rawMinY - padding;
      let maxY = rawMaxY + padding;
      let width = Math.max(maxX - minX, 1000);
      let height = Math.max(maxY - minY, 1000);

      const viewportAspect = VIEWPORT_WIDTH / VIEWPORT_HEIGHT;
      const contentAspect = width / height;

      if (contentAspect > viewportAspect) {
        const adjustedHeight = width / viewportAspect;
        const extraHeight = adjustedHeight - height;
        minY -= extraHeight / 2;
        height = adjustedHeight;
      } else {
        const adjustedWidth = height * viewportAspect;
        const extraWidth = adjustedWidth - width;
        minX -= extraWidth / 2;
        width = adjustedWidth;
      }

      return { minX, minY, width, height };
    }

    function buildGridLines(viewBox) {
      const step = 100;
      const startX = Math.floor(viewBox.minX / step) * step;
      const endX = Math.ceil((viewBox.minX + viewBox.width) / step) * step;
      const startY = Math.floor(viewBox.minY / step) * step;
      const endY = Math.ceil((viewBox.minY + viewBox.height) / step) * step;
      const vertical = [];
      const horizontal = [];

      for (let x = startX; x <= endX; x += step) vertical.push(x);
      for (let y = startY; y <= endY; y += step) horizontal.push(y);

      return { vertical, horizontal, startX, endX, startY, endY };
    }

    function rotateRectangleAroundCenter(points, cx, cy, angleDeg) {
      const rad = angleDeg * Math.PI / 180;
      return points.map(point => {
        const dx = point.x - cx;
        const dy = point.y - cy;
        return {
          x: cx + dx * Math.cos(rad) - dy * Math.sin(rad),
          y: cy + dx * Math.sin(rad) + dy * Math.cos(rad)
        };
      });
    }

    function createBoardPolygon(id, points, fillColor, strokeColor, dash, onClick) {
      return (
        <polygon
          key={id}
          points={points.map(point => `${point.x},${point.y}`).join(" ")}
          fill={fillColor}
          stroke={strokeColor}
          strokeWidth={10}
          strokeDasharray={dash}
          onClick={onClick}
        />
      );
    }

    function PlannerToolbar({ core }) {
      const {
        isClosed,
        layoutRotation,
        setLayoutRotation,
        layoutOffsetX,
        setLayoutOffsetX,
        layoutOffsetY,
        setLayoutOffsetY,
        clearMeasurements,
        reset,
        undoLastPoint,
        closePolygon,
        points
      } = core;

      return (
        <div className="flex flex-wrap items-center gap-3 mb-2">
          <div className="flex items-center gap-2">
            <span>Угол:</span>
            <input
              type="number"
              min="-180"
              max="180"
              step="1"
              value={layoutRotation}
              disabled={!isClosed}
              onChange={(e) => setLayoutRotation(parseFloat(e.target.value) || 0)}
            />
            <span>°</span>
            <span>X:</span>
            <input
              type="number"
              step="10"
              value={layoutOffsetX}
              disabled={!isClosed}
              onChange={(e) => setLayoutOffsetX(parseFloat(e.target.value) || 0)}
            />
            <span>Y:</span>
            <input
              type="number"
              step="10"
              value={layoutOffsetY}
              disabled={!isClosed}
              onChange={(e) => setLayoutOffsetY(parseFloat(e.target.value) || 0)}
            />
          </div>
          <button onClick={clearMeasurements} className="bg-red-100 px-2 py-1 rounded">Удалить измерения</button>
          <button onClick={reset} className="bg-gray-200 px-2 py-1 rounded">Сброс</button>
          <button onClick={undoLastPoint} disabled={points.length === 0 || isClosed} className="bg-yellow-500 text-white px-2 py-1 rounded">Назад</button>
          <button onClick={closePolygon} disabled={points.length < 3 || isClosed} className="bg-blue-500 text-white px-2 py-1 rounded">Замкнуть контур</button>
        </div>
      );
    }

    function PlannerCanvas({ core, pattern }) {
      const {
        svgRef,
        handleClick,
        handleMouseDown,
        handleMouseMove,
        handleMouseUp,
        viewBox,
        gridLines,
        measurements,
        draftRulerStart,
        draftRulerEnd,
        rulerLength,
        rulerMidX,
        rulerMidY,
        rotatedPoints,
        points,
        isClosed,
        lastPoint,
        mousePos,
        startMeasurement
      } = core;

      return (
        <svg
          ref={svgRef}
          onClick={handleClick}
          onMouseDown={handleMouseDown}
          onMouseMove={handleMouseMove}
          onMouseUp={handleMouseUp}
          width={VIEWPORT_WIDTH}
          height={VIEWPORT_HEIGHT}
          viewBox={`${viewBox.minX} ${viewBox.minY} ${viewBox.width} ${viewBox.height}`}
          preserveAspectRatio="xMidYMid meet"
          className="border border-gray-400 bg-white cursor-crosshair"
          style={{
            display: "block",
            border: "2px solid #9ca3af",
            backgroundColor: "#ffffff",
            boxSizing: "border-box"
          }}
        >
          <g>
            {gridLines.vertical.map(x => (
              <line
                key={`grid-v-${x}`}
                x1={x}
                y1={gridLines.startY}
                x2={x}
                y2={gridLines.endY}
                stroke="#eee"
                strokeWidth={5}
              />
            ))}
            {gridLines.horizontal.map(y => (
              <line
                key={`grid-h-${y}`}
                x1={gridLines.startX}
                y1={y}
                x2={gridLines.endX}
                y2={y}
                stroke="#eee"
                strokeWidth={10}
              />
            ))}
            {pattern}
            {measurements.map((measurement, index) => {
              const length = Math.hypot(
                measurement.end.x - measurement.start.x,
                measurement.end.y - measurement.start.y
              );
              const midX = (measurement.start.x + measurement.end.x) / 2;
              const midY = (measurement.start.y + measurement.end.y) / 2;
              return (
                <g key={`measurement-${index}`}>
                  <line
                    x1={measurement.start.x}
                    y1={measurement.start.y}
                    x2={measurement.end.x}
                    y2={measurement.end.y}
                    stroke="#d62828"
                    strokeWidth={12}
                  />
                  <text
                    x={midX}
                    y={midY - 20}
                    fontSize={90}
                    fill="#d62828"
                    textAnchor="middle"
                    stroke="#ffffff"
                    strokeWidth={10}
                    paintOrder="stroke"
                  >
                    {`${length.toFixed(0)} мм`}
                  </text>
                </g>
              );
            })}
            {draftRulerStart && draftRulerEnd && (
              <g>
                <line
                  x1={draftRulerStart.x}
                  y1={draftRulerStart.y}
                  x2={draftRulerEnd.x}
                  y2={draftRulerEnd.y}
                  stroke="#d62828"
                  strokeWidth={12}
                />
                <text
                  x={rulerMidX}
                  y={rulerMidY - 20}
                  fontSize={90}
                  fill="#d62828"
                  textAnchor="middle"
                  stroke="#ffffff"
                  strokeWidth={10}
                  paintOrder="stroke"
                >
                  {`${rulerLength.toFixed(0)} мм`}
                </text>
              </g>
            )}
            {rotatedPoints.map((point, index) => (
              <g key={`point-${index}`}>
                <circle cx={point.x} cy={point.y} r={20} fill="red" />
                <text x={point.x + 30} y={point.y - 30} fontSize={120} fill="black">{index + 1}</text>
              </g>
            ))}
            {rotatedPoints.map((point, index) => {
              const next = rotatedPoints[(index + 1) % rotatedPoints.length];
              if (index === points.length - 1 && !isClosed) return null;
              return (
                <line
                  key={`edge-${index}`}
                  x1={point.x}
                  y1={point.y}
                  x2={next.x}
                  y2={next.y}
                  stroke="black"
                  strokeWidth={10}
                  onClick={(e) => startMeasurement(e, point, next)}
                />
              );
            })}
            {lastPoint && mousePos && !isClosed && (
              <line
                x1={lastPoint.x}
                y1={lastPoint.y}
                x2={mousePos.x}
                y2={mousePos.y}
                stroke="orange"
                strokeWidth={10}
                strokeDasharray="10,10"
              />
            )}
          </g>
        </svg>
      );
    }

    function PlannerLayout({ title, stats, core, pattern }) {
      return (
        <div className="p-4">
          <h1 className="text-xl font-bold mb-2">{title}</h1>
          <div className="flex flex-wrap gap-4 mb-2">
            {stats.map((item, index) => (
              <div key={`stat-${index}`}>{item}</div>
            ))}
          </div>
          {core.hintText && (
            <div className="mb-2 text-sm text-gray-700">{core.hintText}</div>
          )}
          <PlannerToolbar core={core} />
          <PlannerCanvas core={core} pattern={pattern} />
        </div>
      );
    }

    function usePlannerCore(roomState) {
      const {
        points,
        setPoints,
        isClosed,
        setIsClosed,
        mousePos,
        setMousePos,
        layoutRotation,
        setLayoutRotation,
        layoutOffsetX,
        setLayoutOffsetX,
        layoutOffsetY,
        setLayoutOffsetY,
        viewBox,
        setViewBox,
        measurements,
        setMeasurements,
        draftRulerStart,
        setDraftRulerStart,
        draftRulerEnd,
        setDraftRulerEnd,
        dragMeasureStart,
        setDragMeasureStart,
        dragMeasureMoved,
        setDragMeasureMoved,
        suppressBoardClick,
        setSuppressBoardClick,
        isMeasuring,
        setIsMeasuring,
        resetCurrentLayoutSettings
      } = roomState;

      const svgRef = useRef(null);
      const [toggledPlanks, setToggledPlanks] = useState(new Set());
      const rotatedPoints = points;

      const rotationCenter = useMemo(() => {
        if (!points.length) return { x: 0, y: 0 };
        const xs = points.map(point => point.x);
        const ys = points.map(point => point.y);
        return {
          x: (Math.min(...xs) + Math.max(...xs)) / 2,
          y: (Math.min(...ys) + Math.max(...ys)) / 2
        };
      }, [points]);

      function getSvgCoordinates(e) {
        const svg = svgRef.current;
        const point = svg.createSVGPoint();
        point.x = e.clientX;
        point.y = e.clientY;
        const transformed = point.matrixTransform(svg.getScreenCTM().inverse());
        return { x: transformed.x, y: transformed.y };
      }

      function finalizeMeasurement(endPoint, suppressNextBoardClick = false) {
        if (!draftRulerStart) return false;
        const length = Math.hypot(endPoint.x - draftRulerStart.x, endPoint.y - draftRulerStart.y);
        const shouldSave = length >= 15;

        if (shouldSave) {
          setDraftRulerEnd(endPoint);
          setMeasurements(prev => [...prev, { start: draftRulerStart, end: endPoint }]);
          if (suppressNextBoardClick) {
            setSuppressBoardClick(true);
          }
        }

        setDraftRulerStart(null);
        setDraftRulerEnd(null);
        setDragMeasureStart(null);
        setDragMeasureMoved(false);
        setIsMeasuring(false);
        return shouldSave;
      }

      function startMeasurement(e, start, end) {
        if (!isClosed) return;
        e.stopPropagation();
        const point = projectPointToSegment(getSvgCoordinates(e), start, end);
        setDraftRulerStart(point);
        setDraftRulerEnd(point);
        setDragMeasureStart(null);
        setDragMeasureMoved(false);
        setIsMeasuring(true);
      }

      function handleMouseDown(e) {
        if (!isClosed || e.button !== 0 || isMeasuring) return;
        const coords = getSvgCoordinates(e);
        setDragMeasureStart(coords);
        setDragMeasureMoved(false);
        setDraftRulerStart(coords);
        setDraftRulerEnd(coords);
      }

      function handleMouseUp(e) {
        if (!dragMeasureStart) return;
        const coords = getSvgCoordinates(e);
        finalizeMeasurement(coords, true);
      }

      function handleClick(e) {
        if (isClosed) {
          if (isMeasuring && !dragMeasureStart) {
            finalizeMeasurement(getSvgCoordinates(e));
          }
          return;
        }

        const { x, y } = getSvgCoordinates(e);
        setPoints([...points, { x, y }]);
      }

      function handleMouseMove(e) {
        const coords = getSvgCoordinates(e);

        if (dragMeasureStart) {
          setMousePos(coords);
          setDraftRulerEnd(coords);
          if (!dragMeasureMoved && Math.hypot(coords.x - dragMeasureStart.x, coords.y - dragMeasureStart.y) > 5) {
            setDragMeasureMoved(true);
            setIsMeasuring(true);
          }
          return;
        }

        if (isMeasuring) {
          setMousePos(coords);
          setDraftRulerEnd(coords);
          return;
        }

        if (isClosed) return;
        setMousePos(coords);
      }

      function closePolygon() {
        if (points.length >= 3) setIsClosed(true);
      }

      function undoLastPoint() {
        if (isClosed || points.length === 0) return;
        setPoints(points.slice(0, -1));
      }

      function clearMeasurements() {
        setMeasurements([]);
        setDraftRulerStart(null);
        setDraftRulerEnd(null);
        setIsMeasuring(false);
      }

      function reset() {
        setPoints([]);
        setIsClosed(false);
        setMousePos(null);
        setToggledPlanks(new Set());
        resetCurrentLayoutSettings();
        setMeasurements([]);
        setDraftRulerStart(null);
        setDraftRulerEnd(null);
        setDragMeasureStart(null);
        setDragMeasureMoved(false);
        setSuppressBoardClick(false);
        setIsMeasuring(false);
        setViewBox(DEFAULT_VIEWBOX);
      }

      function rotatePatternPolygon(shapePoints) {
        if (!shapePoints.length || layoutRotation === 0 || !points.length) return shapePoints;
        const rad = layoutRotation * Math.PI / 180;
        return shapePoints.map(point => {
          const dx = point.x - rotationCenter.x;
          const dy = point.y - rotationCenter.y;
          return {
            x: rotationCenter.x + dx * Math.cos(rad) - dy * Math.sin(rad),
            y: rotationCenter.y + dx * Math.sin(rad) + dy * Math.cos(rad)
          };
        });
      }

      function transformPatternPolygon(shapePoints) {
        return rotatePatternPolygon(shapePoints).map(point => ({
          x: point.x + layoutOffsetX,
          y: point.y + layoutOffsetY
        }));
      }

      function inverseRotatePatternPolygon(shapePoints) {
        if (!shapePoints.length || layoutRotation === 0 || !points.length) {
          return shapePoints;
        }

        const rad = -layoutRotation * Math.PI / 180;
        return shapePoints.map(point => {
          const dx = point.x - rotationCenter.x;
          const dy = point.y - rotationCenter.y;
          return {
            x: rotationCenter.x + dx * Math.cos(rad) - dy * Math.sin(rad),
            y: rotationCenter.y + dx * Math.sin(rad) + dy * Math.cos(rad)
          };
        });
      }

      function inverseTransformPatternPolygon(shapePoints) {
        const shiftedPoints = shapePoints.map(point => ({
          x: point.x - layoutOffsetX,
          y: point.y - layoutOffsetY
        }));

        if (!shiftedPoints.length || layoutRotation === 0 || !points.length) {
          return shiftedPoints;
        }

        const rad = -layoutRotation * Math.PI / 180;
        return shiftedPoints.map(point => {
          const dx = point.x - rotationCenter.x;
          const dy = point.y - rotationCenter.y;
          return {
            x: rotationCenter.x + dx * Math.cos(rad) - dy * Math.sin(rad),
            y: rotationCenter.y + dx * Math.sin(rad) + dy * Math.cos(rad)
          };
        });
      }

      function handleBoardClick(e, key) {
        e.stopPropagation();

        if (suppressBoardClick) {
          setSuppressBoardClick(false);
          return;
        }

        if (isMeasuring) {
          const savedMeasurement = finalizeMeasurement(getSvgCoordinates(e));
          if (savedMeasurement) return;
        }

        setToggledPlanks(prev => {
          const next = new Set(prev);
          if (next.has(key)) next.delete(key);
          else next.add(key);
          return next;
        });
      }

      useEffect(() => {
        if (isClosed) {
          setToggledPlanks(new Set());
        }
      }, [layoutRotation, isClosed]);

      useEffect(() => {
        if (!isClosed) return;
        setViewBox(buildFittedViewBox(rotatedPoints));
      }, [layoutRotation]);

      const area = isClosed ? polygonArea(rotatedPoints) : 0;
      const areaM2 = (area / 1_000_000).toFixed(2);
      const lastPoint = points[points.length - 1];
      const hintText = lastPoint && mousePos && !isClosed
        ? (() => {
            const dx = mousePos.x - lastPoint.x;
            const dy = mousePos.y - lastPoint.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angle = (Math.atan2(dy, dx) * 180) / Math.PI;
            return `dx: ${dx.toFixed(0)} mm, dy: ${dy.toFixed(0)} mm, distance: ${dist.toFixed(0)} mm, angle: ${angle.toFixed(1)}°`;
          })()
        : "";
      const gridLines = useMemo(() => buildGridLines(viewBox), [viewBox]);
      const rulerLength = draftRulerStart && draftRulerEnd
        ? Math.hypot(draftRulerEnd.x - draftRulerStart.x, draftRulerEnd.y - draftRulerStart.y)
        : 0;
      const rulerMidX = draftRulerStart && draftRulerEnd ? (draftRulerStart.x + draftRulerEnd.x) / 2 : 0;
      const rulerMidY = draftRulerStart && draftRulerEnd ? (draftRulerStart.y + draftRulerEnd.y) / 2 : 0;

      return {
        points,
        isClosed,
        mousePos,
        layoutRotation,
        setLayoutRotation,
        layoutOffsetX,
        setLayoutOffsetX,
        layoutOffsetY,
        setLayoutOffsetY,
        viewBox,
        measurements,
        draftRulerStart,
        draftRulerEnd,
        isMeasuring,
        rotationCenter,
        svgRef,
        toggledPlanks,
        rotatedPoints,
        transformPatternPolygon,
        inverseRotatePatternPolygon,
        inverseTransformPatternPolygon,
        finalizeMeasurement,
        handleBoardClick,
        handleClick,
        handleMouseDown,
        handleMouseMove,
        handleMouseUp,
        closePolygon,
        undoLastPoint,
        clearMeasurements,
        reset,
        startMeasurement,
        areaM2,
        hintText,
        gridLines,
        lastPoint,
        rulerLength,
        rulerMidX,
        rulerMidY
      };
    }

    function EnglishHerringbonePlanner({ roomState }) {
      const core = usePlannerCore(roomState);
      const tileSize = 694;
      const tileWidth = 132;
      let planksNeeded = 0;
      let fullPlanks = 0;
      let cutPlanks = 0;
      const pattern = [];

      if (core.isClosed) {
        const stepX = Math.SQRT2 * tileWidth;
        const stepY = tileSize / Math.SQRT2;
        const localRoomPoints = core.inverseRotatePatternPolygon(core.rotatedPoints);
        const localXs = localRoomPoints.map(point => point.x);
        const localYs = localRoomPoints.map(point => point.y);
        const offsetReach = Math.abs(core.layoutOffsetX) + Math.abs(core.layoutOffsetY);
        const paddingX = tileSize + stepX * 2 + offsetReach;
        const paddingY = tileSize + stepY * 2 + offsetReach;
        const minX = Math.min(...localXs) - paddingX;
        const maxX = Math.max(...localXs) + paddingX;
        const minY = Math.min(...localYs) - paddingY;
        const maxY = Math.max(...localYs) + paddingY;
        const baseX = core.rotationCenter.x;
        const baseY = core.rotationCenter.y;
        const columnStart = Math.floor((minX - baseX - stepX / 2) / stepX) - 1;
        const columnEnd = Math.ceil((maxX - baseX + stepX / 2) / stepX) + 1;
        const rowStart = Math.floor((minY - baseY) / stepY) - 1;
        const rowEnd = Math.ceil((maxY - baseY) / stepY) + 1;

        for (let rowIndex = rowStart; rowIndex <= rowEnd; rowIndex++) {
          const shiftX = rowIndex % 2 !== 0 ? stepX / 2 : 0;
          const angle = rowIndex % 2 === 0 ? 45 : -45;
          const cy = baseY + rowIndex * stepY;

          for (let columnIndex = columnStart; columnIndex <= columnEnd; columnIndex++) {
            const key = `${rowIndex}-${columnIndex}`;
            const cx = baseX + columnIndex * stepX + shiftX;
            const corners = rotateRectangleAroundCenter([
              { x: cx - tileSize / 2, y: cy - tileWidth / 2 },
              { x: cx + tileSize / 2, y: cy - tileWidth / 2 },
              { x: cx + tileSize / 2, y: cy + tileWidth / 2 },
              { x: cx - tileSize / 2, y: cy + tileWidth / 2 }
            ], cx, cy, angle);
            const transformedCorners = core.transformPatternPolygon(corners);
            const isInside = polygonsIntersect(transformedCorners, core.rotatedPoints);
            const manuallyToggled = core.toggledPlanks.has(key);
            const finalVisible = manuallyToggled ? !isInside : isInside;

            if (finalVisible) {
              planksNeeded++;
              const allInside = isPolygonFullyInsidePolygon(transformedCorners, core.rotatedPoints);
              if (allInside) fullPlanks++;
              else cutPlanks++;
            }

            pattern.push(createBoardPolygon(
              `plank-${key}`,
              transformedCorners,
              manuallyToggled ? "lightgray" : (isInside ? (angle === 45 ? "#deb887" : "#a1866f") : "#ffffff"),
              finalVisible ? "#555" : "gray",
              finalVisible ? "" : "20,20",
              (e) => core.handleBoardClick(e, key)
            ));
          }
        }
      }

      const peaksBoxes = Math.ceil(planksNeeded / 12);
      const waterfallsBoxes = Math.ceil(planksNeeded / 15);
      const stats = [
        `Площадь: ${core.areaM2} м²`,
        `Досок: ${planksNeeded} (целых: ${fullPlanks}, рез: ${cutPlanks})`,
        `PEAKS: ${peaksBoxes} уп. (${(peaksBoxes * 1.1).toFixed(3)} м²)`,
        `WATERFALLS: ${waterfallsBoxes} уп. (${(waterfallsBoxes * 1.374).toFixed(3)} м²)`
      ];

      return <PlannerLayout title="Английская елка" stats={stats} core={core} pattern={pattern} />;
    }

    function FrenchHerringbonePlanner({ roomState }) {
      const core = usePlannerCore(roomState);
      const tileSize = 620;
      const tileWidth = 132;
      let planksNeeded = 0;
      let fullPlanks = 0;
      let cutPlanks = 0;
      let aPlanks = 0;
      let bPlanks = 0;
      const pattern = [];

      if (core.isClosed) {
        const rowDx = tileSize / Math.SQRT2;
        const rowDy = -tileSize / Math.SQRT2;
        const colDx = tileWidth / Math.SQRT2;
        const colDy = tileWidth / Math.SQRT2;
        const shiftDx = tileWidth / Math.SQRT2;
        const shiftDy = -tileWidth / Math.SQRT2;
        const basisCoords = core.rotatedPoints.map(point => ({
          i: (point.x + point.y) / (2 * colDx),
          j: (point.x - point.y) / (2 * rowDx)
        }));
        const minI = Math.floor(Math.min(...basisCoords.map(point => point.i))) - 4;
        const maxI = Math.ceil(Math.max(...basisCoords.map(point => point.i))) + 4;
        const minJ = Math.floor(Math.min(...basisCoords.map(point => point.j))) - 4;
        const maxJ = Math.ceil(Math.max(...basisCoords.map(point => point.j))) + 4;

        for (let i = minI; i <= maxI; i++) {
          const boardType = i % 2 === 0 ? "A" : "B";
          const boardColor = boardType === "A" ? "#9a785f" : "#d5b07b";
          const rowOffsetX = boardType === "A" ? 0 : shiftDx;
          const rowOffsetY = boardType === "A" ? 0 : shiftDy;
          const topShiftX = boardType === "A" ? shiftDx : -shiftDx;
          const topShiftY = boardType === "A" ? shiftDy : -shiftDy;

          for (let j = minJ; j <= maxJ; j++) {
            const key = `${boardType}-${i}-${j}`;
            const baseX = i * colDx + j * rowDx + rowOffsetX;
            const baseY = i * colDy + j * rowDy + rowOffsetY;
            const boardPoints = [
              { x: baseX, y: baseY },
              { x: baseX + rowDx, y: baseY + rowDy },
              { x: baseX + rowDx + colDx + topShiftX, y: baseY + rowDy + colDy + topShiftY },
              { x: baseX + colDx + topShiftX, y: baseY + colDy + topShiftY }
            ];
            const transformedPoints = core.transformPatternPolygon(boardPoints);
            const isInside = polygonsIntersect(transformedPoints, core.rotatedPoints);
            const manuallyToggled = core.toggledPlanks.has(key);
            const finalVisible = manuallyToggled ? !isInside : isInside;

            if (finalVisible) {
              planksNeeded++;
              if (boardType === "A") aPlanks++;
              else bPlanks++;

              const allInside = isPolygonFullyInsidePolygon(transformedPoints, core.rotatedPoints);
              if (allInside) fullPlanks++;
              else cutPlanks++;
            }

            pattern.push(createBoardPolygon(
              `french-${key}`,
              transformedPoints,
              manuallyToggled ? "lightgray" : (isInside ? boardColor : "#ffffff"),
              finalVisible ? "#555" : "gray",
              finalVisible ? "" : "20,20",
              (e) => core.handleBoardClick(e, key)
            ));
          }
        }
      }

      const aBoxes = Math.ceil(aPlanks / 12);
      const bBoxes = Math.ceil(bPlanks / 12);
      const stats = [
        `Площадь: ${core.areaM2} м²`,
        `Досок: ${planksNeeded} (A: ${aPlanks}, B: ${bPlanks})`,
        `Упаковок: A ${aBoxes}, B ${bBoxes}`,
        `Целых: ${fullPlanks}, рез: ${cutPlanks}`,
        "Доска: 620 x 132 мм, спил 45°"
      ];

      return <PlannerLayout title="Французская вариант 2" stats={stats} core={core} pattern={pattern} />;
    }

    function FrenchClassicPlanner({ roomState }) {
      const core = usePlannerCore(roomState);
      const tileSize = 620;
      const tileWidth = 132;
      let planksNeeded = 0;
      let fullPlanks = 0;
      let cutPlanks = 0;
      let aPlanks = 0;
      let bPlanks = 0;
      const pattern = [];

      if (core.isClosed) {
        const rotatedRoomX = core.rotatedPoints.map(point => point.x);
        const rotatedRoomY = core.rotatedPoints.map(point => point.y);
        const minRoomX = Math.min(...rotatedRoomX);
        const maxRoomX = Math.max(...rotatedRoomX);
        const minRoomY = Math.min(...rotatedRoomY);
        const maxRoomY = Math.max(...rotatedRoomY);
        const seamLength = tileWidth * Math.SQRT2;
        const sideRun = tileSize / Math.SQRT2;
        const moduleWidth = sideRun * 2;
        const startSeam = Math.floor((minRoomX - moduleWidth * 2) / moduleWidth) * moduleWidth;
        const endSeam = Math.ceil((maxRoomX + moduleWidth * 2) / moduleWidth) * moduleWidth;
        const startSegment = Math.floor((minRoomY - sideRun * 2) / seamLength) - 4;
        const endSegment = Math.ceil((maxRoomY + sideRun * 2) / seamLength) + 4;

        for (let seamX = startSeam; seamX <= endSeam; seamX += moduleWidth) {
          for (let segment = startSegment; segment <= endSegment; segment++) {
            const y0 = segment * seamLength;
            const boards = [
              {
                type: "A",
                color: "#d5b07b",
                key: `CA-${seamX}-${segment}`,
                points: [
                  { x: seamX, y: y0 },
                  { x: seamX, y: y0 + seamLength },
                  { x: seamX - sideRun, y: y0 + seamLength + sideRun },
                  { x: seamX - sideRun, y: y0 + sideRun }
                ]
              },
              {
                type: "B",
                color: "#9a785f",
                key: `CB-${seamX}-${segment}`,
                points: [
                  { x: seamX, y: y0 },
                  { x: seamX + sideRun, y: y0 + sideRun },
                  { x: seamX + sideRun, y: y0 + seamLength + sideRun },
                  { x: seamX, y: y0 + seamLength }
                ]
              }
            ];

            for (const board of boards) {
              const transformedPoints = core.transformPatternPolygon(board.points);
              const isInside = polygonsIntersect(transformedPoints, core.rotatedPoints);
              const manuallyToggled = core.toggledPlanks.has(board.key);
              const finalVisible = manuallyToggled ? !isInside : isInside;

              if (finalVisible) {
                planksNeeded++;
                if (board.type === "A") aPlanks++;
                else bPlanks++;

                const allInside = isPolygonFullyInsidePolygon(transformedPoints, core.rotatedPoints);
                if (allInside) fullPlanks++;
                else cutPlanks++;
              }

              pattern.push(createBoardPolygon(
                `classic-${board.key}`,
                transformedPoints,
                manuallyToggled ? "lightgray" : (isInside ? board.color : "#ffffff"),
                finalVisible ? "#555" : "gray",
                finalVisible ? "" : "20,20",
                (e) => core.handleBoardClick(e, board.key)
              ));
            }
          }
        }
      }

      const aBoxes = Math.ceil(aPlanks / 12);
      const bBoxes = Math.ceil(bPlanks / 12);
      const stats = [
        `Площадь: ${core.areaM2} м²`,
        `Досок: ${planksNeeded} (A: ${aPlanks}, B: ${bPlanks})`,
        `Упаковок: A ${aBoxes}, B ${bBoxes}`,
        `Целых: ${fullPlanks}, рез: ${cutPlanks}`,
        "Доска: 620 x 132 мм, спил 45°"
      ];

      return <PlannerLayout title="Французская Классическая" stats={stats} core={core} pattern={pattern} />;
    }

    function FrenchBraidPlanner({ roomState, title = "Царская елка", singlePair = false, singleRow = false, pairBOffsetY = 0, moduleShiftXOverride = null, moduleShiftYOverride = null, rowShiftXOverride = null, rowShiftYOverride = null, previewRowCount = null, previewRepeatCount = null }) {
      const core = usePlannerCore(roomState);
      const tileSize = 620;
      const tileWidth = 132;
      let planksNeeded = 0;
      let fullPlanks = 0;
      let cutPlanks = 0;
      let aPlanks = 0;
      let bPlanks = 0;
      const pattern = [];

      if (core.isClosed) {
        const rotatedRoomX = core.rotatedPoints.map(point => point.x);
        const rotatedRoomY = core.rotatedPoints.map(point => point.y);
        const minRoomX = Math.min(...rotatedRoomX);
        const maxRoomX = Math.max(...rotatedRoomX);
        const minRoomY = Math.min(...rotatedRoomY);
        const maxRoomY = Math.max(...rotatedRoomY);
        const shortSide = tileWidth;
        const shortEdgeLength = tileWidth * Math.SQRT2;
        const sideRun = tileSize / Math.SQRT2;
        const moduleShiftX = moduleShiftXOverride ?? -tileWidth;
        const moduleShiftY = moduleShiftYOverride ?? -(shortEdgeLength - tileWidth);
        const rowShiftX = rowShiftXOverride ?? tileSize / Math.SQRT2;
        const rowShiftY = rowShiftYOverride ?? -(tileSize + tileSize / Math.SQRT2);
        const centerX = (minRoomX + maxRoomX) / 2;
        const centerY = (minRoomY + maxRoomY) / 2 - shortSide / 2;
        const repeatReachX = Math.ceil((maxRoomX - minRoomX + tileSize * 4) / tileWidth) + 4;
        const repeatReachY = Math.ceil((maxRoomY - minRoomY + tileSize * 4) / (shortEdgeLength - tileWidth)) + 4;
        const repeatReach = Math.max(repeatReachX, repeatReachY);
        const rowReachX = Math.ceil((maxRoomX - minRoomX + tileSize * 4) / rowShiftX) + 4;
        const rowReachY = Math.ceil((maxRoomY - minRoomY + tileSize * 4) / Math.abs(rowShiftY)) + 4;
        const rowReach = Math.max(rowReachX, rowReachY);
        const extraRenderPadding = tileSize;
        const renderMinX = minRoomX - extraRenderPadding;
        const renderMaxX = maxRoomX + extraRenderPadding;
        const renderMinY = minRoomY - extraRenderPadding;
        const renderMaxY = maxRoomY + extraRenderPadding;
        const rowStart = previewRowCount !== null ? 0 : ((singlePair || singleRow) ? 0 : -rowReach);
        const rowEnd = previewRowCount !== null ? Math.max(0, previewRowCount - 1) : ((singlePair || singleRow) ? 0 : rowReach);
        const repeatStart = previewRepeatCount !== null ? 0 : (singlePair ? 0 : -repeatReach);
        const repeatEnd = previewRepeatCount !== null ? Math.max(0, previewRepeatCount - 1) : (singlePair ? 0 : repeatReach);

        for (let row = rowStart; row <= rowEnd; row++) {
          for (let repeat = repeatStart; repeat <= repeatEnd; repeat++) {
            const seamX = centerX + row * rowShiftX + repeat * moduleShiftX;
            const y0 = centerY + row * rowShiftY + repeat * moduleShiftY;
            const boardA = {
              type: "A",
              color: "#d5b07b",
              key: `BA-${row}-${repeat}`,
              points: [
                { x: seamX, y: y0 },
                { x: seamX, y: y0 + shortEdgeLength },
                { x: seamX - sideRun, y: y0 + shortEdgeLength + sideRun },
                { x: seamX - sideRun, y: y0 + sideRun }
              ]
            };
            const bAnchorX = seamX;
            const bAnchorY = y0 + shortEdgeLength + pairBOffsetY;
            const boardB = {
              type: "B",
              color: "#9a785f",
              key: `BB-${row}-${repeat}`,
              points: [
                { x: bAnchorX, y: bAnchorY },
                { x: bAnchorX + shortSide, y: bAnchorY - shortSide },
                { x: bAnchorX + shortSide, y: bAnchorY - shortSide - tileSize },
                { x: bAnchorX, y: bAnchorY - tileSize }
              ]
            };

            for (const board of [boardA, boardB]) {
              const transformedPoints = core.transformPatternPolygon(board.points);
              const isInside = polygonsIntersect(transformedPoints, core.rotatedPoints);
              const manuallyToggled = core.toggledPlanks.has(board.key);
              const finalVisible = manuallyToggled ? !isInside : isInside;
              const bounds = getPolygonBounds(transformedPoints);
              const nearRoom = !(
                bounds.maxX < renderMinX
                || bounds.minX > renderMaxX
                || bounds.maxY < renderMinY
                || bounds.minY > renderMaxY
              );

              if (!finalVisible && !manuallyToggled && !nearRoom) continue;

              if (finalVisible) {
                planksNeeded++;
                if (board.type === "A") aPlanks++;
                else bPlanks++;

                const allInside = isPolygonFullyInsidePolygon(transformedPoints, core.rotatedPoints);
                if (allInside) fullPlanks++;
                else cutPlanks++;
              }

              pattern.push(createBoardPolygon(
                `braid-${board.key}`,
                transformedPoints,
                manuallyToggled ? "lightgray" : (isInside ? board.color : "#ffffff"),
                finalVisible ? "#555" : "gray",
                finalVisible ? "" : "20,20",
                (e) => core.handleBoardClick(e, board.key)
              ));
            }
          }
        }
      }

      const aBoxes = Math.ceil(aPlanks / 12);
      const bBoxes = Math.ceil(bPlanks / 12);
      const stats = [
        `Площадь: ${core.areaM2} м²`,
        `Досок: ${planksNeeded} (A: ${aPlanks}, B: ${bPlanks})`,
        `Упаковок: A ${aBoxes}, B ${bBoxes}`,
        `Целых: ${fullPlanks}, рез: ${cutPlanks}`,
        "Доска: 620 x 132 мм, спил 45°"
      ];

      return <PlannerLayout title={title} stats={stats} core={core} pattern={pattern} />;
    }

    function FrenchLayoutsHub() {
      const [selectedLayout, setSelectedLayout] = useState("english");
      const layoutDefaults = {
        english: { rotation: 90, offsetX: 0, offsetY: 0 },
        variant2: { rotation: -45, offsetX: 0, offsetY: 0 },
        classic: { rotation: 0, offsetX: 0, offsetY: 0 },
        italian: { rotation: -23, offsetX: 0, offsetY: 0 },
        braid: { rotation: 67, offsetX: 0, offsetY: 0 }
      };
      const [points, setPoints] = useState([]);
      const [isClosed, setIsClosed] = useState(false);
      const [mousePos, setMousePos] = useState(null);
      const [layoutSettings, setLayoutSettings] = useState(layoutDefaults);
      const [measurements, setMeasurements] = useState([]);
      const [draftRulerStart, setDraftRulerStart] = useState(null);
      const [draftRulerEnd, setDraftRulerEnd] = useState(null);
      const [dragMeasureStart, setDragMeasureStart] = useState(null);
      const [dragMeasureMoved, setDragMeasureMoved] = useState(false);
      const [suppressBoardClick, setSuppressBoardClick] = useState(false);
      const [isMeasuring, setIsMeasuring] = useState(false);
      const [viewBox, setViewBox] = useState(DEFAULT_VIEWBOX);

      const currentLayoutSettings = layoutSettings[selectedLayout] || layoutDefaults[selectedLayout];
      const layoutRotation = currentLayoutSettings.rotation;
      const layoutOffsetX = currentLayoutSettings.offsetX;
      const layoutOffsetY = currentLayoutSettings.offsetY;

      function updateCurrentLayoutSetting(field, value) {
        setLayoutSettings(prev => ({
          ...prev,
          [selectedLayout]: {
            ...(prev[selectedLayout] || layoutDefaults[selectedLayout]),
            [field]: value
          }
        }));
      }

      function resetCurrentLayoutSettings() {
        setLayoutSettings(prev => ({
          ...prev,
          [selectedLayout]: { ...layoutDefaults[selectedLayout] }
        }));
      }

      const roomState = {
        points,
        setPoints,
        isClosed,
        setIsClosed,
        mousePos,
        setMousePos,
        layoutRotation,
        setLayoutRotation: (value) => updateCurrentLayoutSetting("rotation", value),
        layoutOffsetX,
        setLayoutOffsetX: (value) => updateCurrentLayoutSetting("offsetX", value),
        layoutOffsetY,
        setLayoutOffsetY: (value) => updateCurrentLayoutSetting("offsetY", value),
        resetCurrentLayoutSettings,
        measurements,
        setMeasurements,
        draftRulerStart,
        setDraftRulerStart,
        draftRulerEnd,
        setDraftRulerEnd,
        dragMeasureStart,
        setDragMeasureStart,
        dragMeasureMoved,
        setDragMeasureMoved,
        suppressBoardClick,
        setSuppressBoardClick,
        isMeasuring,
        setIsMeasuring,
        viewBox,
        setViewBox
      };

      return (
        <div>
          <div className="mb-4" style={{ maxWidth: "360px" }}>
            <label style={{ marginBottom: "6px", fontWeight: "bold" }}>
              Варианты укладки:
            </label>
            <select
              value={selectedLayout}
              onChange={(e) => setSelectedLayout(e.target.value)}
              style={{
                width: "100%",
                padding: "8px 10px",
                fontSize: "16px",
                marginTop: "6px"
              }}
            >
              <option value="english">Английская елка</option>
              <option value="variant2">Французская вариант 2</option>
              <option value="classic">Французская Классическая</option>
              <option value="italian">Итальянская елка</option>
              <option value="braid">Царская елка</option>
            </select>
          </div>

          {selectedLayout === "english" && <EnglishHerringbonePlanner roomState={roomState} />}
          {selectedLayout === "variant2" && <FrenchHerringbonePlanner roomState={roomState} />}
          {selectedLayout === "classic" && <FrenchClassicPlanner roomState={roomState} />}
          {selectedLayout === "italian" && (
            <FrenchBraidPlanner
              roomState={roomState}
              title="Итальянская елка"
              pairBOffsetY={620 - 132 * Math.SQRT2}
              moduleShiftXOverride={132}
              moduleShiftYOverride={-132 * Math.SQRT2-132}
              rowShiftXOverride={620 / Math.SQRT2 + 132}
              rowShiftYOverride={-132}
            />
          )}
          {selectedLayout === "braid" && <FrenchBraidPlanner roomState={roomState} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('french-root')).render(<FrenchLayoutsHub />);
</script>
