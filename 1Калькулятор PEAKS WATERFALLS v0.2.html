  <script>
    const plankLength = 694;
    const plankWidth = 132;
    const patternWidth = plankLength;
    const patternHeight = plankLength + plankWidth;
    const angle = 45 * Math.PI / 180;

function drawRoom(usableW, usableH, fullW, fullH, stepX, stepY, startX, startY, offsetXuser, offsetYuser, roomRotDeg) {
  const plankShapes = [];
  let totalCount = 0;
  let insideRoomCount = 0;

  const shiftX = offsetXuser || 0;
  const shiftY = offsetYuser || 0;
  const roomX = startX;
  const roomY = startY;

  const roomCx = roomX + fullW / 2;
  const roomCy = roomY + fullH / 2;
  const rad = roomRotDeg * Math.PI / 180;

  const maskDeltaW = (fullW - usableW) / 2;
  const maskDeltaH = (fullH - usableH) / 2;
  const maskX = roomX + maskDeltaW;
  const maskY = roomY + maskDeltaH;
  const maskW = usableW;
  const maskH = usableH;

  const virtualX0 = roomX - 1000;
  const virtualY0 = roomY - 1000;
  const virtualX1 = roomX + fullW + 1000;
  const virtualY1 = roomY + fullH;

  const cols = Math.ceil((virtualX1 - virtualX0) / stepX) + 2;
  const rows = Math.ceil((virtualY1 - virtualY0) / stepY) + 2;

  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      const cx = i * stepX + virtualX0 + shiftX;
      const cy = j * stepY + virtualY0 + shiftY;

      const plankSet = [
        { x: cx - patternWidth / 2, y: cy - patternHeight / 2, w: plankLength, h: plankWidth, baseColor: "saddlebrown" },
        { x: cx - patternWidth / 2 + (patternWidth - plankWidth), y: cy - patternHeight / 2 + plankWidth, w: plankWidth, h: plankLength, baseColor: "peru" }
      ];

      for (const { x, y, w, h, baseColor } of plankSet) {
        const coords = rotateRect(x, y, w, h, cx, cy, angle);
        const isInsideMask = isFullyInsideRotatedRoom(coords, maskX, maskY, maskW, maskH, roomCx, roomCy, rad);
        const isInsideRoom = isFullyInsideRotatedRoom(coords, roomX, roomY, fullW, fullH, roomCx, roomCy, rad);
        const rotatedCoords = coords.map(([px, py]) => rotatePoint(px, py, roomCx, roomCy, rad));

        plankShapes.push({
          type: "path",
          path: `M${rotatedCoords.map(p => p.join(",")).join("L")}Z`,
          fillcolor: isInsideMask ? baseColor : "rgba(0,0,0,0)",
          line: {
            width: 0.5,
            color: isInsideMask ? "black" : "gray",
            dash: isInsideMask ? "solid" : "dot"
          }
        });

        if (isInsideMask) totalCount++;
        if (isInsideRoom) insideRoomCount++;
      }
    }
  }

  const roomRect = rotateRect(roomX, roomY, fullW, fullH, roomCx, roomCy, -rad)
    .map(([x, y]) => rotatePoint(x, y, roomCx, roomCy, rad));

  const outline = {
    type: "path",
    path: `M${roomRect.map(p => p.join(",")).join("L")}Z`,
    line: { color: "black", width: 2 },
    fillcolor: "rgba(0,0,0,0)"
  };

  return { shapes: [...plankShapes, outline], totalCount, insideRoomCount };
}

function rotatePoint(x, y, cx, cy, ang) {
  const dx = x - cx;
  const dy = y - cy;
  const rx = cx + dx * Math.cos(ang) - dy * Math.sin(ang);
  const ry = cy + dx * Math.sin(ang) + dy * Math.cos(ang);
  return [rx, ry];
}

function isFullyInsideRotatedRoom(coords, roomX, roomY, roomW, roomH, cx, cy, rad) {
  return coords
    .map(([x, y]) => rotatePoint(x, y, cx, cy, rad))
    .every(([x, y]) => x >= roomX && x <= roomX + roomW && y >= roomY && y <= roomY + roomH);
}

function rotateRect(x, y, w, h, cx, cy, ang) {
  const corners = [[x, y], [x+w, y], [x+w, y+h], [x, y+h]];
  return corners.map(([px, py]) => {
    const dx = px - cx;
    const dy = py - cy;
    const rx = cx + dx * Math.cos(ang) - dy * Math.sin(ang);
    const ry = cy + dx * Math.sin(ang) + dy * Math.cos(ang);
    return [rx, ry];
  });
}

function calculate() {
  const width = parseFloat(document.getElementById("width").value);
  const height = parseFloat(document.getElementById("height").value);
  const widthMargin = 100*parseFloat(document.getElementById("widthMargin").value) || 0;
  const heightMargin = 200*parseFloat(document.getElementById("heightMargin").value) || 0;
  const offsetX = parseFloat(document.getElementById("offsetX").value) || 0;
  const offsetY = parseFloat(document.getElementById("offsetY").value) || 0;
  const roomRotation = parseFloat(document.getElementById("roomRotation").value) || 0;

  const usableWidth = width + widthMargin;
  const usableHeight = height + heightMargin;

  const stepX = plankWidth * Math.sqrt(2);
  const stepY = plankLength * Math.sqrt(2);
  const startX = - stepX * 2;
  const startY = - stepY * 2;

  const { shapes, totalCount, insideRoomCount } = drawRoom(usableWidth, usableHeight, width, height, stepX, stepY, startX, startY, offsetX, offsetY, roomRotation);

  const areaRoom = width * height / 1000000;
  const full = insideRoomCount;
  const cut = totalCount - insideRoomCount;
  const count = totalCount;
  const peaksBoxes = Math.ceil(count / 12);
  const waterfallsBoxes = Math.ceil(count / 15);

  document.getElementById("results").innerHTML = `
    <p>Количество досок: <b>${count}</b></p>
    <p>Из них целых: <b>${full}</b>, обрезанных: <b>${cut}</b></p>
    <p>Площадь комнаты: <b>${areaRoom.toFixed(2)} м²</b></p>
    <p><b>Коллекция PEAKS: ${peaksBoxes} уп.</b> (${Math.round(peaksBoxes*1.10*100)/100} м²)</p>
    <p><b>Коллекция WATERFALLS: ${waterfallsBoxes} уп.</b> (${Math.round(waterfallsBoxes*1.374*100)/100} м²)</p>
  `;

  Plotly.react("plot", [{
    type: "scatter",
    x: [0], y: [0], mode: "markers", marker: {opacity: 0}
  }], {
    margin: {t: 0, l: 0, r: 0, b: 0},
    xaxis: {
      visible: false,
      scaleanchor: "y",
      range: (window.prevXRange || undefined)
    },
    yaxis: {
      visible: false,
      range: (window.prevYRange || undefined)
    },
    shapes
  }).then(gd => {
    const layout = gd.layout;
    window.prevXRange = layout.xaxis.range;
    window.prevYRange = layout.yaxis.range;

    gd.on('plotly_relayout', ev => {
      const layout = gd.layout;

      if (ev['xaxis.range[0]'] && ev['xaxis.range[1]']) {
        window.prevXRange = [ev['xaxis.range[0]'], ev['xaxis.range[1]']];
      } else if (ev['xaxis.autorange']) {
        window.prevXRange = layout.xaxis.range;
      }

      if (ev['yaxis.range[0]'] && ev['yaxis.range[1]']) {
        window.prevYRange = [ev['yaxis.range[0]'], ev['yaxis.range[1]']];
      } else if (ev['yaxis.autorange']) {
        window.prevYRange = layout.yaxis.range;
      }
    });
  });
}

  document.querySelectorAll("input").forEach(input => input.addEventListener("input", calculate));
  calculate();
  </script><svg id="js-plotly-tester" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="position: absolute; left: -10000px; top: -10000px; width: 9000px; height: 9000px; z-index: 1;"><path class="js-reference-point" d="M0,0H1V1H0Z" style="stroke-width: 0; fill: black;"></path></svg>


</body></html>
