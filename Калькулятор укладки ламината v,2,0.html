"0" y1="96200" x2="10000" y2="96200" stroke="#eee" stroke-width="10"></line><line x1="0" y1="96300" x2="10000" y2="96300" stroke="#eee" stroke-width="10"></line><line x1="0" y1="96400" x2="10000" y2="96400" stroke="#eee" stroke-width="10"></line><line x1="0" y1="96500" x2="10000" y2="96500" stroke="#eee" stroke-width="10"></line><line x1="0" y1="96600" x2="10000" y2="96600" stroke="#eee" stroke-width="10"></line><line x1="0" y1="96700" x2="10000" y2="96700" stroke="#eee" stroke-width="10"></line><line x1="0" y1="96800" x2="10000" y2="96800" stroke="#eee" stroke-width="10"></line><line x1="0" y1="96900" x2="10000" y2="96900" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97000" x2="10000" y2="97000" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97100" x2="10000" y2="97100" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97200" x2="10000" y2="97200" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97300" x2="10000" y2="97300" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97400" x2="10000" y2="97400" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97500" x2="10000" y2="97500" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97600" x2="10000" y2="97600" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97700" x2="10000" y2="97700" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97800" x2="10000" y2="97800" stroke="#eee" stroke-width="10"></line><line x1="0" y1="97900" x2="10000" y2="97900" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98000" x2="10000" y2="98000" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98100" x2="10000" y2="98100" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98200" x2="10000" y2="98200" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98300" x2="10000" y2="98300" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98400" x2="10000" y2="98400" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98500" x2="10000" y2="98500" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98600" x2="10000" y2="98600" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98700" x2="10000" y2="98700" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98800" x2="10000" y2="98800" stroke="#eee" stroke-width="10"></line><line x1="0" y1="98900" x2="10000" y2="98900" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99000" x2="10000" y2="99000" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99100" x2="10000" y2="99100" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99200" x2="10000" y2="99200" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99300" x2="10000" y2="99300" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99400" x2="10000" y2="99400" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99500" x2="10000" y2="99500" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99600" x2="10000" y2="99600" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99700" x2="10000" y2="99700" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99800" x2="10000" y2="99800" stroke="#eee" stroke-width="10"></line><line x1="0" y1="99900" x2="10000" y2="99900" stroke="#eee" stroke-width="10"></line></g></svg></div></div>
  </div>

  <script>
    function showTab(id, btn) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }
  </script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function FloorPlanner() {
      const [points, setPoints] = useState([]);
      const [isClosed, setIsClosed] = useState(false);
      const [tileSize] = useState(694);
      const [tileWidth] = useState(132);
      const [scale] = useState(0.1);
      const [mousePos, setMousePos] = useState(null);
      const svgRef = useRef(null);
      const [toggledPlanks, setToggledPlanks] = useState(new Set());

      function handleClick(e) {
        if (isClosed) return;
        const rect = svgRef.current.getBoundingClientRect();
        const x = (e.clientX - rect.left) / scale;
        const y = (e.clientY - rect.top) / scale;
        setPoints([...points, { x, y }]);
      }

      function handleMouseMove(e) {
        const rect = svgRef.current.getBoundingClientRect();
        const x = (e.clientX - rect.left) / scale;
        const y = (e.clientY - rect.top) / scale;
        setMousePos({ x, y });
      }

      function closePolygon() {
        if (points.length >= 3) setIsClosed(true);
      }

      function undoLastPoint() {
        if (isClosed || points.length === 0) return;
        setPoints(points.slice(0, -1));
      }

      function reset() {
        setPoints([]);
        setIsClosed(false);
        setMousePos(null);
        setToggledPlanks(new Set());
      }

      function polygonArea(pts) {
        let area = 0;
        for (let i = 0; i < pts.length; i++) {
          const j = (i + 1) % pts.length;
          area += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
        }
        return Math.abs(area / 2);
      }

      const area = isClosed ? polygonArea(points) : 0;
      const areaM2 = (area / 1_000_000).toFixed(2);
      let planksNeeded = 0, fullPlanks = 0, cutPlanks = 0;
      const lastPoint = points[points.length - 1];
      let hintText = "";
      if (lastPoint && mousePos && !isClosed) {
        const dx = mousePos.x - lastPoint.x;
        const dy = mousePos.y - lastPoint.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = (Math.atan2(dy, dx) * 180) / Math.PI;
        hintText = `dx: ${dx.toFixed(0)} mm, dy: ${dy.toFixed(0)} mm, distance: ${dist.toFixed(0)} mm, angle: ${angle.toFixed(1)}°`;
      }

      const pattern = [];
      const isPointInPolygon = (point, polygon) => {
        let inside = false;
        for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
          const xi = polygon[i].x, yi = polygon[i].y;
          const xj = polygon[j].x, yj = polygon[j].y;
          const intersect = ((yi > point.y) !== (yj > point.y)) &&
            (point.x < (xj - xi) * (point.y - yi) / (yj - yi + 0.00001) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      };

      if (isClosed) {
        const stepX = Math.SQRT2 * tileWidth;
        const stepY = tileSize / Math.SQRT2;
        const minX = Math.min(...points.map(p => p.x)) - 650;
        const maxX = Math.max(...points.map(p => p.x)) + 650;
        const centerY = (Math.min(...points.map(p => p.y)) + Math.max(...points.map(p => p.y))) / 2;

        for (let rowIndex = -20; rowIndex <= 20; rowIndex++) {
          const shiftX = rowIndex % 2 !== 0 ? stepX / 2 : 0;
          const shiftY = rowIndex % 2 !== 0 ? -Math.SQRT2 * tileWidth / 2 : 0;
          const angle = rowIndex % 2 === 0 ? 45 : -45;
          const cy = centerY + rowIndex * stepY;

          for (let x = minX; x < maxX; x += stepX) {
            const cx = x + shiftX;
            const corners = [
              { x: cx - tileSize / 2, y: cy - tileWidth / 2 },
              { x: cx + tileSize / 2, y: cy - tileWidth / 2 },
              { x: cx + tileSize / 2, y: cy + tileWidth / 2 },
              { x: cx - tileSize / 2, y: cy + tileWidth / 2 },
            ].map(p => {
              const rad = (angle * Math.PI) / 180;
              const dx = p.x - cx;
              const dy = p.y - cy;
              return {
                x: cx + dx * Math.cos(rad) - dy * Math.sin(rad),
                y: cy + dx * Math.sin(rad) + dy * Math.cos(rad)
              };
            });

            const isInside = corners.some(c => isPointInPolygon(c, points));
            const key = `${rowIndex}-${x}`;
            const manuallyToggled = toggledPlanks.has(key);
            const finalVisible = manuallyToggled ? !isInside : isInside;

            if (finalVisible) {
              planksNeeded++;
              const allInside = corners.every(c => isPointInPolygon(c, points));
              if (allInside) fullPlanks++;
              else cutPlanks++;
            }

            const fillColor = manuallyToggled
              ? "lightgray"
              : isInside
                ? (angle === 45 ? "#deb887" : "#a1866f")
                : "#ffffff";

            const strokeColor = finalVisible ? "#555" : "gray";
            const dash = finalVisible ? "" : "20,20";

            pattern.push(
              <rect
                key={`plank-${rowIndex}-${x}`}
                x={cx - tileSize / 2}
                y={cy - tileWidth / 2}
                width={tileSize}
                height={tileWidth}
                transform={`rotate(${angle} ${cx} ${cy})`}
                fill={fillColor}
                stroke={strokeColor}
                strokeWidth={10}
                strokeDasharray={dash}
                onClick={(e) => {
                  e.stopPropagation();
                  setToggledPlanks(prev => {
                    const newSet = new Set(prev);
                    const key = `${rowIndex}-${x}`;
                    if (newSet.has(key)) newSet.delete(key);
                    else newSet.add(key);
                    return newSet;
                  });
                }}
              />
            );
          }
        }
      }

      return (
        <div className="p-4">
          <h1 className="text-xl font-bold mb-2">Инженерный редактор укладки</h1>
          <div className="flex gap-4 mb-2">
            <button onClick={reset} className="bg-gray-200 px-2 py-1 rounded">Reset</button>
            <button onClick={undoLastPoint} disabled={points.length === 0 || isClosed} className="bg-yellow-500 text-white px-2 py-1 rounded">Undo</button>
            <button onClick={closePolygon} disabled={points.length < 3 || isClosed} className="bg-blue-500 text-white px-2 py-1 rounded">Close Shape</button>
            <div>Area: {areaM2} m²</div>
            <div>Досок: {planksNeeded} (цел: {fullPlanks}, рез: {cutPlanks})</div>
            <div>PEAKS: {Math.ceil(planksNeeded / 12)} уп. ({(Math.ceil(planksNeeded / 12)*1.1).toFixed(3)} м2)</div>
            <div>WATERFALLS: {Math.ceil(planksNeeded / 15)} уп. ({(Math.ceil(planksNeeded / 15)*1.374).toFixed(3)} м2)</div>
          </div>
          {hintText && (
            <div className="mb-2 text-sm text-gray-700">{hintText}</div>
          )}
          <svg
            ref={svgRef}
            onClick={handleClick}
            onMouseMove={handleMouseMove}
            width={800}
            height={600}
            className="border border-gray-400 bg-white cursor-crosshair"
          >
            <g transform={`scale(${scale})`}>
              {Array.from({ length: 1000 }).map((_, i) => (
                <line
                  key={`v${i}`}
                  x1={i * 100}
                  y1={0}
                  x2={i * 100}
                  y2={10000}
                  stroke="#eee"
                  strokeWidth={5}
                />
              ))}
              {Array.from({ length: 1000 }).map((_, i) => (
                <line
                  key={`h${i}`}
                  x1={0}
                  y1={i * 100}
                  x2={10000}
                  y2={i * 100}
                  stroke="#eee"
                  strokeWidth={10}
                />
              ))}
              {pattern}
              {points.map((p, i) => (
                <g key={i}>
                  <circle cx={p.x} cy={p.y} r={20} fill="red" />
                  <text x={p.x + 30} y={p.y - 30} fontSize={120} fill="black">{i + 1}</text>
                </g>
              ))}
              {points.map((p, i) => {
                const next = points[(i + 1) % points.length];
                if (i === points.length - 1 && !isClosed) return null;
                return <line key={i} x1={p.x} y1={p.y} x2={next.x} y2={next.y} stroke="black" strokeWidth={10} />;
              })}
              {lastPoint && mousePos && !isClosed && (
                <line
                  x1={lastPoint.x}
                  y1={lastPoint.y}
                  x2={mousePos.x}
                  y2={mousePos.y}
                  stroke="orange"
                  strokeWidth={10}
                  strokeDasharray="10,10"
                />
              )}
            </g>
          </svg>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("react-root")).render(<FloorPlanner />);
  </script>
